spring:
  application:
    name: cfd-order-service
  cloud:
    nacos:
      discovery:
        enabled: false

services:
  risk:
    url: http://localhost:8081

cfd:
  topic:
    orderOpen: cfd.order.open.command
    tradeFeedback: cfd.trade.opened.feedback
  outbox:
    relay:
      fixed-delay-ms: 1000
      batch-size: 200

server:
  port: 8082
