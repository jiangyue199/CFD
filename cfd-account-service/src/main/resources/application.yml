spring:
  application:
    name: cfd-account-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cfd_account?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  cloud:
    nacos:
      discovery:
        enabled: false

server:
  port: 8086
